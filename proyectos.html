    <script src="/js/main.js"></script>
    <script>
        // ===== LÓGICA DE FILTRADO POR CATEGORÍAS =====
        document.addEventListener('DOMContentLoaded', function() {
            // 1. Seleccionamos todos los botones y todos los proyectos
            const botonesFiltro = document.querySelectorAll('.filtro-boton');
            const todosLosProyectos = document.querySelectorAll('.proyecto-card');

            // 2. Añadimos un evento 'click' a cada botón
            botonesFiltro.forEach(boton => {
                boton.addEventListener('click', function() {
                    // 3. Obtenemos el valor de categoría del botón (data-filtro)
                    const filtroSeleccionado = this.getAttribute('data-filtro');
                    
                    // 4. (Opcional) Cambiamos la clase 'activo' de los botones para estilos visuales
                    botonesFiltro.forEach(btn => btn.classList.remove('activo'));
                    this.classList.add('activo');

                    // 5. Recorremos todos los proyectos y decidimos si mostrarlos u ocultarlos
                    todosLosProyectos.forEach(proyecto => {
                        // Obtenemos la categoría de cada proyecto (data-categoria)
                        const categoriaProyecto = proyecto.getAttribute('data-categoria');
                        
                        if (filtroSeleccionado === 'todos') {
                            // Si el filtro es 'todos', mostramos todos los proyectos
                            proyecto.classList.remove('oculto');
                        } else {
                            // Si no, comparamos la categoría del proyecto con el filtro
                            if (categoriaProyecto === filtroSeleccionado) {
                                proyecto.classList.remove('oculto'); // Coincide: lo mostramos
                            } else {
                                proyecto.classList.add('oculto'); // No coincide: lo ocultamos
                            }
                        }
                    });
                });
            });
        });
    </script>
